{% extends 'core/base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Job Card: {{ jobcard.jobcard_id }}</h2>
        <div class="alert alert-info">
            This job card has been submitted and is no longer editable by the technician.
        </div>
        <p><strong>Status:</strong> {{ jobcard.get_status_display }}</p>
        <p><strong>Client:</strong> {{ jobcard.client_name }}</p>
        <a href="{% url 'technician_dashboard' %}" class="btn btn-primary">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
